<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Email Change</title>
    <style>
        body {
            background-color: #020202;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.05em;
            color: #ffffff;
            text-decoration: none;
        }

        .content {
            background-color: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
        }

        p {
            color: #a1a1a1;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .button {
            display: inline-block;
            background-color: #ffffff;
            color: #020202 !important;
            text-decoration: none;
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #525252;
            font-size: 12px;
        }

        .divider {
            height: 1px;
            background-color: rgba(255, 255, 255, 0.08);
            margin: 32px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">SAGITARIUS.CC</div>
        </div>
        <div class="content">
            <h1>Confirm email change</h1>
            <p>Click the button below to confirm that you want to change your email address.</p>
            <a href="{{ .ConfirmationURL }}" class="button">Confirm New Email</a>
            <div class="divider"></div>
            <p style="font-size: 12px; margin-bottom: 0;">If you didn't request this, you can safely ignore this email.
            </p>
        </div>
        <div class="footer">
            &copy; 2024 Sagitarius. All rights reserved.
        </div>
    </div>
</body>

</html>
